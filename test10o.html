<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Farm AI</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
  padding: 20px;
  background: #1e293b;
  border-radius: 12px;
}

h2 {
  text-align: center;
  color: #4ade80;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

.card {
  padding: 15px;
  margin-top: 15px;
  background: #0f172a;
  border-radius: 8px;
  text-align: center;
}

.value {
  font-size: 28px;
  font-weight: bold;
  color: #4ade80;
}

.label {
  font-size: 12px;
  color: #94a3b8;
}

.status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2> Eden Ai</h2>

<input id="crop" placeholder="Type crop (e.g. maize)">

<div id="status" class="status">Idle</div>

<div class="card">
  <div class="label">MAX TEMPERATURE (°C)</div>
  <div id="temp" class="value">--</div>
</div>

<div class="card">
  <div class="label">MIN MOISTURE (%)</div>
  <div id="moist" class="value">--</div>
</div>

<div class="card">
  <div class="label">LIGHT THRESHOLD</div>
  <div id="light" class="value">--</div>
</div>

</div>

<script>
let timer;

document.getElementById("crop").addEventListener("input", () => {
  const crop = document.getElementById("crop").value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (crop.length > 2) {

      
      document.getElementById("temp").innerText = "...";
      document.getElementById("moist").innerText = "...";
      document.getElementById("light").innerText = "...";

      document.getElementById("status").innerText = "⚡ Calling AI...";

      runAI(crop);
    }
  }, 500);
});

async function runAI(crop) {
  try {
    const res = await fetch("https://test10o.app.n8n.cloud/webhook-test/plant-control", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ crop: crop })
    });

   
    if (!res.ok) {
      throw new Error("Webhook not responding");
    }

    
    let data = {};
    try {
      data = await res.json();
    } catch {
      throw new Error("No JSON returned from n8n");
    }

    console.log("n8n response:", data); // debug

    
    document.getElementById("temp").innerText = data.tempMax ?? 25;
    document.getElementById("moist").innerText = data.moistureMin ?? 50;
    document.getElementById("light").innerText = data.lightLow ?? 2000;

    document.getElementById("status").innerText = "✅ AI Updated";

  } catch (err) {
    document.getElementById("status").innerText = "❌ Error connecting to AI";
    console.error("ERROR:", err);
  }
}
</script>

</body>
</html>
